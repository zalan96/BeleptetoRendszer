<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="stylesheet" href="src/reg.css">
</head>
<body>
        <div id="app">
                <nav class="top-nav">
                    <div class="nav-inner">
                        <div class="left">
                            <div class="logo">OTCBR</div>
                            <div class="nav-status offline"><span class="status-dot"></span><span class="status-text">Státusz</span></div>
                        </div>
                        <div class="center">
                            <div class="nav-links">
                                <a href="index.html#fooldal">Főoldal</a>
                                <a href="index.html#orarend">Órarend</a>
                                <a href="index.html#kapcsolat">Kapcsolat</a>
                            </div>
                        </div>
                        <div class="right" id="nav-session-actions">
                            <button id="nav-login" class="primary" type="button">Bejelentkezés</button>
                        </div>
                    </div>
                </nav>
                <main class="page-shell">
            <header class="banner">
                <div class="brand">
                    <span class="eyebrow">OTCBR</span>
                    <h1>Regisztráció</h1>
                    <p class="subtitle">Regisztrálj itt, hogy hozzáférj a beléptető rendszerhez.</p>
                </div>
            </header>

            <section style="padding:32px; display:flex; justify-content:center;">
                <form id="registration-form" class="mini-schedule" style="max-width:560px; width:100%; display:block; padding:24px;" action="#" method="post">
                    <div style="margin-bottom:12px;">
                        <label for="name" style="display:block; font-weight:700; margin-bottom:6px; color:var(--accent-dark);">Teljes név</label>
                        <input id="name" name="name" type="text" placeholder="Pl. Kovács János" required style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06);">
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                        <div>
                            <label for="email" style="display:block; font-weight:700; margin-bottom:6px; color:var(--accent-dark);">E-mail</label>
                            <input id="email" name="email" type="email" placeholder="email@pelda.hu" required style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06);">
                        </div>
                        <div>
                            <label for="phone" style="display:block; font-weight:700; margin-bottom:6px; color:var(--accent-dark);">Telefonszám</label>
                            <input id="phone" name="phone" type="tel" placeholder="06 30 123 4567" style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06);">
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                        <div>
                            <label for="birth" style="display:block; font-weight:700; margin-bottom:6px; color:var(--accent-dark);">Születési dátum</label>
                            <input id="birth" name="birth" type="date" style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06);">
                        </div>
                        <div>
                            <label for="password" style="display:block; font-weight:700; margin-bottom:6px; color:var(--accent-dark);">Jelszó</label>
                            <input id="password" name="password" type="password" placeholder="********" required style="width:100%; padding:10px; border-radius:8px; border:1px solid rgba(0,0,0,0.06);">
                        </div>
                    </div>

                    <p id="registration-status" style="margin:0 0 10px; color:var(--muted); font-weight:600;"></p>

                    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:8px;">
                        <button type="reset" class="secondary" style="padding:10px 14px;">Törlés</button>
                        <button type="submit" class="primary" style="padding:10px 14px;">Regisztráció</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script type="module" src="src/reg.js"></script>
        </body>
</html>
